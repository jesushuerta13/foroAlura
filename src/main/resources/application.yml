spring:
application:
name: foro-api

datasource:
url: jdbc:mysql://localhost:3306/foro_api?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
username: ${DB_USERNAME}$
password: ${DB_PASS}$
driver-class-name: com.mysql.cj.jdbc.Driver

jpa:
  hibernate:
    ddl-auto: validate
  show-sql: true
  properties:
    hibernate:
    format_sql: true

flyway:
enabled: true
locations: classpath:db/migration

threads:
  virtual:
   enabled: true

server:
  error:
    include-message: always

app:
  jwt:
    secret: ${SECRET}$
    expiration-ms: 3600000






